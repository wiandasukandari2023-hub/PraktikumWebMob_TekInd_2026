<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="Pertemuan 6.css">
    <title>Latihan praktikum 6_Wianda Sukandari_23051430002</title>
</head>

<body>

    <header>
        <h1>Pertemuan 6 - DOM MANIPULATION & EVENT HANDLING</h1>
        <p class="sub">Dibuat oleh : Wianda Sukandari (23051430002)</p>

    </header>

    <div class="container">
        <!-- Simulasi Panel Kontrol Mesin (Meeting 6) -->
        <div class="card mt-4">
            <div class="card-header bg-dark text-white">Panel Kontrol Mesin-01</div>
            <div class="card-body text-center">
                <!-- Indikator Status -->
                <div id="statusIndicator" class="alert alert-secondary" role="alert">
                    Status: <strong>UNKNOWN</strong>
                </div>
                <h2 id="suhuMesin">25 °C</h2>
                <p>Suhu Operasional Saat Ini</p>
                <div class="d-grid gap-2 d-md-block">
                    <button id="btnStart" class="btn btn-success btn-lg">START</button>
                    <button id="btnStop" class="btn btn-danger btn-lg">STOP</button>
                    <button id="btnReset" class="btn btn-warning btn-lg">RESET</button>
                    <button id="btnMaintenance" class="btn btn-secondary btn-lg mt-2">MAINTENANCE MODE</button>
                </div>
            </div>

            <div class="mt-3">
                <label>Set Target Kecepatan (RPM):</label>
                <input type="number" id="inputRPM" class="form-control" placeholder="Max 2000 RPM">
                <small id="pesanError" class="text-danger d-none">RPM melebihi batas aman!</small>
            </div>
        </div>

    </div>

    <script src="Pertemuan 6.js"></script>
