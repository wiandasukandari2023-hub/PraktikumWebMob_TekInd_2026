<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Aplikasi Checklist 5S</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2 class="text-center mb-4">
        Checklist Audit 5S <br>
        <small class="text-muted">Wianda Sukandari (23051430002)</small>
    </h2>

    <div class="row">
        <!-- FORM AUDIT -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Form Audit 5S</h5>
                </div>
                <div class="card-body">
                    <form id="form5S">
                        <!-- Operator -->
                        <div class="mb-3">
                            <label class="form-label">Operator <span class="text-danger">*</span></label>
                            <select id="operator" class="form-select" required>
                                <option value="">-- Pilih Operator --</option>
                            </select>
                            <div id="operatorError" class="text-danger small mt-1" style="display: none;"></div>
                        </div>

                        <!-- Shift -->
                        <div class="mb-3">
                            <label class="form-label">Shift <span class="text-danger">*</span></label>
                            <select id="shift" class="form-select" required>
                                <option value="">-- Pilih Shift --</option>
                                <option value="Pagi (06:00-14:00)">Pagi (06:00-14:00)</option>
                                <option value="Siang (14:00-22:00)">Siang (14:00-22:00)</option>
                                <option value="Malam (22:00-06:00)">Malam (22:00-06:00)</option>
                            </select>
                        </div>

                        <!-- Tanggal Inspeksi -->
                        <div class="mb-3">
                            <label class="form-label">Tanggal Inspeksi <span class="text-danger">*</span></label>
                            <input type="date" id="tanggalInspeksi" class="form-control" required>
                        </div>

                        <!-- Item Penilaian 5S -->
                        <h6 class="mb-2 mt-3">Item Penilaian 5S:</h6>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="seiri">
                            <label class="form-check-label">1. Seiri (Penyortiran)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="seiton">
                            <label class="form-check-label">2. Seiton (Tatanan)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="seiso">
                            <label class="form-check-label">3. Seiso (Kejernihan)</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="seiketsu">
                            <label class="form-check-label">4. Seiketsu (Kestandaran)</label>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="shitsuke">
                            <label class="form-check-label">5. Shitsuke (Disiplin)</label>
                        </div>

                        <button type="submit" class="btn btn-success w-100" id="submitBtn">
                            Simpan Audit
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- RIWAYAT AUDIT -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0">Riwayat Audit 5S</h5>
                </div>
                <div class="card-body">
                    <!-- Search Operator -->
                    <div class="mb-3">
                        <label class="form-label">Search Operator:</label>
                        <div class="input-group">
                            <input type="text" id="searchRiwayat" class="form-control" placeholder="Cari nama operator...">
                            <button class="btn btn-outline-secondary" type="button" id="clearSearch">Clear</button>
                        </div>
                    </div>

                    <!-- Tabel -->
                    <div class="table-responsive">
                        <table class="table table-bordered table-hover">
                            <thead class="table-dark">
                                <tr>
                                    <th>Tanggal</th>
                                    <th>Shift</th>
                                    <th>Operator</th>
                                    <th>Skor (%)</th>
                                    <th>Detail 5S</th>
                                    <th>Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tabelBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="Aplikasi Checklist 5S.js"></script>
</body>

</html>
