<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Integrasi API Data Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">
    <h2 class="mb-4">Data Karyawan (Dari Server)</h2>
    <small class="text-muted">Wianda Sukandari (23051430002)</small>
    
    <!-- Tombol Load Data (Sudah ada) -->
    <div class="mb-3">
        <button id="btnLoad" class="btn btn-primary">Muat Data dari API</button>
        <div id="loading" class="spinner-border text-primary d-none" role="status"></div>
    </div>

    <!-- BARU: Form Tambah Karyawan -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-success text-white">
            <h5>Tambah Karyawan Baru</h5>
        </div>
        <div class="card-body">
            <form id="formKaryawan">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nama Lengkap</label>
                        <input type="text" class="form-control" id="nama" placeholder="John Doe" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" placeholder="john@example.com" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Perusahaan</label>
                    <input type="text" class="form-control" id="perusahaan" placeholder="PT. Teknologi Jaya" required>
                </div>
                <button type="submit" class="btn btn-success">
                    Simpan Karyawan Baru
                </button>
            </form>
        </div>
    </div>

    <div class="row" id="containerKaryawan">
        <!-- Card karyawan akan muncul di sini -->
    </div>

    <script src="latihan1.js"></script>
</body>
</html>
